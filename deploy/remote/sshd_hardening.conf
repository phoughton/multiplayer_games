# Drop-in at /etc/ssh/sshd_config.d/00-pong-hardening.conf.
# Overrides the distro defaults; installed last by the deploy so that a
# bad edit doesn't lock the operator out mid-run (the installer runs
# `sshd -t` before reloading).

# Root login: key-only. Keeps the deploy working.
PermitRootLogin prohibit-password

# No passwords, no challenge/response, no keyboard-interactive auth.
PasswordAuthentication no
ChallengeResponseAuthentication no
KbdInteractiveAuthentication no
PermitEmptyPasswords no

# PAM still required for account, session, and pw-expiry management.
UsePAM yes

# Disable anything we don't use.
X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
GatewayPorts no
PermitTunnel no

# Auth aggression.
MaxAuthTries 3
MaxSessions 4
LoginGraceTime 20

# Idle detection — prune stuck sessions.
ClientAliveInterval 300
ClientAliveCountMax 2

# Address family / protocol.
Protocol 2
