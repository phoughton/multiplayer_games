# Pong multiplayer server — nginx site.
#
# Pre-certbot: only port 80 is served. `certbot --nginx` mutates this file
# in place on first issue to add the HTTPS server block and the 80 -> 443
# redirect. Re-runs of the deploy rewrite this file from the template;
# certbot then re-applies its edits on the next issue/renew cycle.

# --- apex: redirect peterhoughton.com -> www.peterhoughton.com -----------
server {
    listen 80;
    listen [::]:80;
    server_name peterhoughton.com;

    # ACME HTTP-01 challenge path (certbot will also manage this).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://www.peterhoughton.com$request_uri;
    }
}

# --- main site: www.peterhoughton.com ------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name www.peterhoughton.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Security headers applied at nginx level too (belt-and-braces with app).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), accelerometer=(), gyroscope=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Reject oversized requests; the app already caps WS frames at 4 KiB.
    client_max_body_size 16k;
    client_body_buffer_size 8k;
    large_client_header_buffers 2 4k;

    # Hide server version.
    server_tokens off;

    # WebSocket upgrade path.
    location = /ws {
        limit_req zone=pong_connect burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Idle games can sit in countdown/paused states; keep the WS open.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 30s;

        # Disable buffering for realtime traffic.
        proxy_buffering off;
    }

    # Static + health.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}
